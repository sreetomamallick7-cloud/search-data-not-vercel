<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin — Upload Week</title>
  <style>
    body { font-family: system-ui; max-width: 640px; margin: 40px auto;
           padding: 0 20px; color: #1a1a1a; }
    h2   { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
    label { display: block; font-size: 13px; color: #555;
            margin-bottom: 4px; margin-top: 16px; }
    input[type=text], input[type=date], input[type=password], input[type=file] {
        width: 100%; padding: 8px 10px; border: 1px solid #ddd;
        border-radius: 6px; font-size: 13px; box-sizing: border-box; }
    button { margin-top: 24px; padding: 10px 24px; background: #4f46e5;
             color: white; border: none; border-radius: 6px;
             font-size: 13px; font-weight: 600; cursor: pointer; }
    button:disabled { background: #a5b4fc; cursor: not-allowed; }
    #status { margin-top: 16px; font-size: 13px; padding: 10px;
              border-radius: 6px; display: none; }
    .ok  { background: #ecfdf5; color: #065f46; }
    .err { background: #fef2f2; color: #991b1b; }
    table { width: 100%; border-collapse: collapse;
            font-size: 12px; margin-top: 32px; }
    th { text-align: left; padding: 8px; background: #f9fafb;
         border-bottom: 1px solid #e5e7eb; color: #6b7280; }
    td { padding: 8px; border-bottom: 1px solid #f3f4f6; }
    .del { color: #dc2626; cursor: pointer; font-size: 11px;
           background: none; border: none; }
  </style>
</head>
<body>
  <h2>Upload weekly search data</h2>

  <label>Admin password</label>
  <input type="password" id="pwd" placeholder="Enter admin password" />

  <label>Week label (shown on dashboard)</label>
  <input type="text" id="label" placeholder="e.g. W1 — Jan 6-12, 2025" />

  <label>Week start date</label>
  <input type="date" id="date" />

  <label>Search terms CSV</label>
  <input type="file" id="search_file" accept=".csv" />

  <label>A2C CSV</label>
  <input type="file" id="a2c_file" accept=".csv" />

  <button id="uploadBtn" onclick="uploadWeek()">Upload week</button>
  <div id="status"></div>

  <h2 style="margin-top:40px">Uploaded weeks</h2>
  <table>
    <thead>
      <tr>
        <th>Label</th><th>Week start</th>
        <th>Terms</th><th>Searches</th><th></th>
      </tr>
    </thead>
    <tbody id="weeksList"></tbody>
  </table>

  <h2 style="margin-top:48px">Upload monthly data (seasonality)</h2>

  <label>Admin password</label>
  <input type="password" id="pwdMonth"
         placeholder="Enter admin password" />

  <label>Month</label>
  <input type="month" id="monthPicker" />

  <label>Search terms CSV</label>
  <input type="file" id="search_file_month" accept=".csv" />

  <label>A2C CSV</label>
  <input type="file" id="a2c_file_month" accept=".csv" />

  <button id="uploadMonthBtn" onclick="uploadMonth()">
    Upload month
  </button>
  <div id="statusMonth"></div>

  <h2 style="margin-top:40px">Uploaded months</h2>
  <table>
    <thead>
      <tr>
        <th>Label</th><th>Terms</th><th>Searches</th><th></th>
      </tr>
    </thead>
    <tbody id="monthsList"></tbody>
  </table>

  <script>
    async function uploadWeek() {
      const btn = document.getElementById('uploadBtn');
      const status = document.getElementById('status');
      btn.disabled = true;
      status.style.display = 'none';

      let pwd = document.getElementById('pwd').value.trim();
      if (!pwd) {
        pwd = prompt("Enter admin password to upload week:");
        if (pwd === null) {
          btn.disabled = false;
          return;
        }
        if (pwd.trim() === '') {
          alert('Password cannot be empty.');
          btn.disabled = false;
          return;
        }
        document.getElementById('pwd').value = pwd;
      }

      const fd = new FormData();
      fd.append('password',        pwd);
      fd.append('label',           document.getElementById('label').value.trim());
      fd.append('week_start_date', document.getElementById('date').value);
      const sf = document.getElementById('search_file').files[0];
      const af = document.getElementById('a2c_file').files[0];
      if (sf) fd.append('search_terms', sf);
      if (af) fd.append('a2c', af);

      try {
        const res  = await fetch('/admin/upload-week',
                                  { method: 'POST', body: fd });
        const data = await res.json();
        status.style.display = 'block';
        if (data.status === 'success') {
          status.className = 'ok';
          status.textContent =
            `Uploaded "${data.label}" — ${data.terms_uploaded} terms`;
          loadWeeks();
        } else {
          status.className = 'err';
          status.textContent = 'Error: ' + data.message;
        }
      } catch(e) {
        status.className = 'err';
        status.style.display = 'block';
        status.textContent = 'Network error: ' + e.message;
      }
      btn.disabled = false;
    }

    async function loadWeeks() {
      const res  = await fetch('/weeks');
      const data = await res.json();
      const tbody = document.getElementById('weeksList');
      tbody.innerHTML = (data.weeks || []).map(w => `
        <tr>
          <td>${w.label}</td>
          <td>${w.week_start_date || '—'}</td>
          <td>${(w.total_terms  || 0).toLocaleString()}</td>
          <td>${(w.total_searches || 0).toLocaleString()}</td>
          <td><button class="del"
                onclick="deleteWeek(${w.id}, '${w.label}')">
              delete</button></td>
        </tr>`).join('');
    }

    async function deleteWeek(id, label) {
      let pwd = document.getElementById('pwd').value;
      if (!pwd) {
        pwd = prompt(`Enter admin password to delete "${label}":`);
        if (pwd === null) return; // User clicked Cancel
        if (pwd.trim() === '') {
          alert('Password cannot be empty.');
          return;
        }
      }
      if (!confirm(`Delete "${label}"? This cannot be undone.`)) return;
      
      try {
        const res = await fetch(`/admin/delete-week/${id}`, {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pwd })
        });
        
        let data;
        try {
          data = await res.json();
        } catch (err) {
          data = {};
        }

        if (res.ok && data.status === 'success') {
          document.getElementById('pwd').value = pwd;
          loadWeeks();
        } else {
          alert('Error: ' + (data.message || 'Failed to delete week. Make sure the password is correct.'));
        }
      } catch (e) {
        alert('Network error: ' + e.message);
      }
    }

    async function uploadMonth() {
      const btn    = document.getElementById('uploadMonthBtn');
      const status = document.getElementById('statusMonth');
      btn.disabled = true;
      status.style.display = 'none';

      const monthVal = document.getElementById('monthPicker').value;
      // monthVal format: "2025-04"
      if (!monthVal) {
        status.className = 'err';
        status.style.display = 'block';
        status.textContent = 'Please select a month';
        btn.disabled = false;
        return;
      }

      const fd = new FormData();
      fd.append('password', document.getElementById('pwdMonth').value);
      fd.append('month_value', monthVal);
      const sf = document.getElementById('search_file_month').files[0];
      const af = document.getElementById('a2c_file_month').files[0];
      if (sf) fd.append('search_terms', sf);
      if (af) fd.append('a2c', af);

      try {
        const res  = await fetch('/admin/upload-month',
                                  { method: 'POST', body: fd });
        const data = await res.json();
        status.style.display = 'block';
        if (data.status === 'success') {
          status.className = 'ok';
          status.textContent =
            `Uploaded "${data.label}" — ${data.terms_uploaded} terms`;
          loadMonths();
        } else {
          status.className = 'err';
          status.textContent = 'Error: ' + data.message;
        }
      } catch(e) {
        status.className = 'err';
        status.style.display = 'block';
        status.textContent = 'Network error: ' + e.message;
      }
      btn.disabled = false;
    }

    async function loadMonths() {
      const res  = await fetch('/months');
      const data = await res.json();
      const tbody = document.getElementById('monthsList');
      tbody.innerHTML = (data.months || []).map(m => `
        <tr>
          <td>${m.label}</td>
          <td>${(m.total_terms || 0).toLocaleString()}</td>
          <td>${(m.total_searches || 0).toLocaleString()}</td>
          <td><button class="del"
                onclick="deleteMonth(${m.id}, '${m.label}')">
              delete</button></td>
        </tr>`).join('');
    }

    async function deleteMonth(id, label) {
      const pwd = document.getElementById('pwdMonth').value;
      if (!confirm(`Delete "${label}"? This cannot be undone.`)) return;
      await fetch(`/admin/delete-month/${id}`, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pwd })
      });
      loadMonths();
    }

    loadWeeks();
    loadMonths();
  </script>
</body>
</html>
