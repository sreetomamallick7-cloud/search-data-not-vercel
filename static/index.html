<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Analytics Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
    <!-- Chart.js (CDN-native, no Node deps) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --color-background-primary: #ffffff;
            --color-text-secondary: #4b5563;
        }
        body { font-family: 'Inter', sans-serif; }
    </style>
    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            const root = document.getElementById('root');
            if (root) {
                root.innerHTML = `
                    <div style="padding: 24px; background: #fff5f5; border: 1px solid #feb2b2; color: #9b2c2c; font-family: system-ui, -apple-system, sans-serif; margin: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);">
                        <h3 style="margin-top: 0; font-size: 18px; font-weight: 600;">⚠️ Application Load Error</h3>
                        <p style="font-size: 14px; margin: 8px 0;"><strong>Message:</strong> ${message}</p>
                        <p style="font-size: 14px; margin: 8px 0;"><strong>Source:</strong> ${source || 'unknown'}:${lineno || 0}:${colno || 0}</p>
                        <hr style="border: 0; border-top: 1px solid #feb2b2; margin: 16px 0;" />
                        <p style="font-size: 13px; color: #c53030; margin: 0;"><strong>Troubleshooting Tip:</strong> Try clearing your browser's local storage (run <code>localStorage.clear()</code> in console) and refreshing the page.</p>
                    </div>
                `;
            }
            return false;
        };
        window.addEventListener('unhandledrejection', function(event) {
            const root = document.getElementById('root');
            if (root) {
                root.innerHTML = `
                    <div style="padding: 24px; background: #fff5f5; border: 1px solid #feb2b2; color: #9b2c2c; font-family: system-ui, -apple-system, sans-serif; margin: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);">
                        <h3 style="margin-top: 0; font-size: 18px; font-weight: 600;">⚠️ Application Promise Rejection</h3>
                        <p style="font-size: 14px; margin: 8px 0;"><strong>Reason:</strong> ${event.reason}</p>
                        <hr style="border: 0; border-top: 1px solid #feb2b2; margin: 16px 0;" />
                        <p style="font-size: 13px; color: #c53030; margin: 0;"><strong>Troubleshooting Tip:</strong> Try clearing your browser's local storage and refreshing.</p>
                    </div>
                `;
            }
        });
    </script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="root"></div>
    <script type="text/babel" src="/app.js"></script>
</body>
</html>
